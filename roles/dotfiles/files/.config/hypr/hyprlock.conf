source = $HOME/.config/hypr/colors.conf

$font = JetBrainsMono Nerd Font

# GENERAL
general {
  hide_cursor = true
}

# BACKGROUND
background {
  monitor =
  path = $HOME/.config/hypr/wallpaper.png
  blur_passes = 3
  color = $bg0
}

# HOURS
label {
  monitor =
  shadow_passes = 2
  shadow_size = 4
  shadow_color = $bg0
  text = cmd[update:1000] echo "$(date +"%H")"
  color = $fg
  font_size = 120
  font_family = $font
  position = 0, 70
  halign = center
  valign = center
}

# MINUTES
label {
  monitor =
  shadow_passes = 2
  shadow_size = 4
  shadow_color = $bg0
  text = cmd[update:1000] echo "$(date +"%M")"
  color = $fg
  font_size = 120
  font_family = $font
  position = 0, -70
  halign = center
  valign = center
}

# INPUT FIELD
input-field {
  monitor =
  size = 300, 60
  outline_thickness = 4
  dots_size = 0.2
  dots_spacing = 0.2
  dots_center = true
  shadow_passes = 2
  shadow_size = 4
  shadow_color = $bg0
  outer_color = $accent1
  inner_color = $bg0
  font_color = $fg
  fade_on_empty = true
  placeholder_text = <span><i>󰌾 Logged in as </i><span>$USER</span></span>
  hide_input = false
  check_color = $accent0
  fail_color = $red
  fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
  capslock_color = $yellow
  position = 0, -200
  halign = center
  valign = center
}
